<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .av { display:inline-flex; align-items:center; justify-content:center; color:#fff; font-weight:600; border-radius:50%; }
  .ring-wrap { position:relative; display:inline-grid; place-items:center; }
  .ring-wrap::before { content:""; position:absolute; inset:-4px; border-radius:50%; border:2.5px solid var(--gold); }
  .ring-wrap.silver::before { border-color:var(--silver); }
</style></head>
<body>
  <div class="row" style="gap:18px;">
    <span class="av" style="width:36px;height:36px;background:#fa114f;font-size:13px;">AC</span>
    <span class="av" style="width:36px;height:36px;background:#3c5bbf;font-size:13px;">ML</span>
    <span class="av" style="width:36px;height:36px;background:#2a8c66;font-size:13px;">SS</span>
    <span class="ring-wrap"><span class="av" style="width:44px;height:44px;background:#f2a03e;font-size:16px;border:1.5px solid #fff;">DK</span></span>
    <span class="ring-wrap silver"><span class="av" style="width:44px;height:44px;background:#7a5bc0;font-size:16px;border:1.5px solid #fff;">JL</span></span>
  </div>
  <div class="mono" style="margin-top:16px;">Deterministic color from name hash (8-color palette) · medal rank adds gold/silver/bronze ring</div>
</body></html>

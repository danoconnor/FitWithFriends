<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .stack { display:flex; flex-direction:column; gap:18px; }
  .lab { font-size:11px; color:var(--ink-mute); margin-bottom:6px; }
  .track { height:6px; border-radius:99px; background:var(--brand-soft); overflow:hidden; }
  .fill-grad { height:6px; border-radius:99px; background:linear-gradient(90deg,var(--brand),var(--brand-hi)); }
  .fill-solid { height:4px; border-radius:99px; background:var(--brand); }
  .track-thin { height:4px; border-radius:99px; background:var(--brand-soft); overflow:hidden; }
</style></head>
<body>
  <div class="stack">
    <div><div class="lab">Time progress — Day 8 of 12 · 67% (brand→brand-hi gradient, 6px)</div><div class="track"><div class="fill-grad" style="width:67%"></div></div></div>
    <div><div class="lab">Leaderboard progress — solid brand, 4px</div><div class="track-thin"><div class="fill-solid" style="width:88%"></div></div></div>
  </div>
</body></html>

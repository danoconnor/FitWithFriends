<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .wrap { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  .fwf-btn-primary i, .fwf-btn-secondary i { width:17px; height:17px; }
</style></head>
<body>
  <div class="wrap">
    <button class="fwf-btn-primary"><i data-lucide="apple"></i>Sign in with Apple</button>
    <button class="fwf-btn-secondary"><i data-lucide="plus"></i>Start a new competition</button>
  </div>
  <div class="mono" style="margin-top:12px;">Primary: Ink fill, inverted text, 16r, h54 · Secondary: dashed Brand outline, 18r, h56</div>
  <script>lucide.createIcons();</script>
</body></html>

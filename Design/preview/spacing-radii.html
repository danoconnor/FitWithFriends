<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .grid { display:grid; grid-template-columns: repeat(5,1fr); gap:14px; align-items:end; }
  .box { background:var(--brand-soft); border:1.5px solid var(--brand); }
  .b22 { width:100%; height:62px; border-radius:22px; }
  .b18 { width:100%; height:62px; border-radius:18px; }
  .b16 { width:100%; height:62px; border-radius:16px; }
  .b14 { width:100%; height:62px; border-radius:14px; }
  .b12 { width:100%; height:62px; border-radius:12px; }
  .cap { text-align:center; }
  .v { font-size:13px; font-weight:700; color:var(--ink); }
  .n { font-size:10.5px; color:var(--ink-mute); }
</style></head>
<body>
  <div class="grid">
    <div class="col"><div class="box b22"></div><div class="cap"><div class="v">22</div><div class="n">cards</div></div></div>
    <div class="col"><div class="box b18"></div><div class="cap"><div class="v">18</div><div class="n">dashed btn</div></div></div>
    <div class="col"><div class="box b16"></div><div class="cap"><div class="v">16</div><div class="n">primary btn</div></div></div>
    <div class="col"><div class="box b14"></div><div class="cap"><div class="v">14</div><div class="n">rows/fields</div></div></div>
    <div class="col"><div class="box b12"></div><div class="cap"><div class="v">12</div><div class="n">wells</div></div></div>
  </div>
  <div class="mono" style="margin-top:14px;">Continuous (squircle) corners on device · chips use full pill</div>
</body></html>

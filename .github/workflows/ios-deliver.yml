name: App Store Upload with Release Metadata

on:
  workflow_dispatch:

env:
  XCODE_PROJECT_DIR: ./Clients/iOS/FitWithFriends

jobs:
  deliver:
    name: Capture screenshots and upload to App Store Connect
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate SecretConstants.swift
        run: |
          TEMPLATE="Clients/iOS/FitWithFriends/FitWithFriends/Utilities/SecretConstantsTemplate.swift"
          OUTPUT="Clients/iOS/FitWithFriends/FitWithFriends/Utilities/SecretConstants.swift"
          if [ ! -f "$OUTPUT" ]; then
            cp "$TEMPLATE" "$OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: WebService/FitWithFriends/package-lock.json

      - name: Start UI test backend
        run: Scripts/start-ui-test-backend-native.sh

      - name: Install Fastlane
        run: brew install fastlane

      - name: Create iPhone 16 Plus simulator
        run: |
          runtime=$(xcrun simctl list runtimes | grep -E '^iOS' | sort -V | tail -1 | awk '{print $NF}')
          xcrun simctl create "iPhone 16 Plus" "iPhone 16 Plus" "$runtime"

      - name: Capture and frame screenshots
        working-directory: ${{ env.XCODE_PROJECT_DIR }}
        run: fastlane screenshots_ci

      - name: Stop UI test backend
        if: always()
        run: Scripts/stop-ui-test-backend-native.sh

      - name: Capture watch screenshots
        working-directory: ${{ env.XCODE_PROJECT_DIR }}
        run: fastlane watch_screenshots

      - name: Upload metadata and screenshots
        working-directory: ${{ env.XCODE_PROJECT_DIR }}
        env:
          APP_STORE_CONNECT_KEY_ID:      ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:   ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT_BASE64 }}
        run: fastlane release

name: Perform daily tasks (hourly cron)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  perform-daily-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Call performDailyTasks endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: ${{ secrets.FWF_ADMIN_AUTH_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/admin/performDailyTasks")
          echo "Response status: $response"
          if [ "$response" -ne 200 ]; then
            echo "Error: endpoint returned HTTP $response"
            exit 1
          fi

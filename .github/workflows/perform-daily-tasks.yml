name: Perform daily tasks (hourly cron)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  perform-daily-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Call performDailyTasks endpoint
        run: |
          body_file=$(mktemp)
          status=$(curl -s -o "$body_file" -w "%{http_code}" \
            -X POST \
            -H 'Authorization: ${{ secrets.FWF_ADMIN_AUTH_SECRET }}' \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/admin/performDailyTasks")
          echo "Response status: $status"
          echo "Summary:"
          jq . "$body_file"
          if [ "$status" -ne 200 ]; then
            echo "Error: endpoint returned HTTP $status"
            exit 1
          fi

name: Deploy iOS app to App Store Connect

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Clients/iOS/**'
  workflow_dispatch:

env:
  XCODE_PROJECT_DIR: ./Clients/iOS/FitWithFriends
  WORKSPACE_NAME: FitWithFriends.xcworkspace
  SCHEME: FitWithFriends
  TEAM_ID: U7MJ9CBUMD

jobs:
  deploy:
    name: Build and upload to App Store Connect
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_CONTENT_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT_BASE64" | base64 --decode \
            > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Install distribution certificate
        env:
          DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$DISTRIBUTION_CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k build.keychain \
            -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12

      - name: Build archive
        working-directory: ${{ env.XCODE_PROJECT_DIR }}
        run: |
          xcodebuild archive \
            -workspace "$WORKSPACE_NAME" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/FitWithFriends.xcarchive" \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }} \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Export and upload to App Store Connect
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/FitWithFriends.xcarchive" \
            -exportOptionsPlist "${{ env.XCODE_PROJECT_DIR }}/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }} \
            -allowProvisioningUpdates

      - name: Clean up
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f ~/.private_keys/AuthKey_*.p8 || true

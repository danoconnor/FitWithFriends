name: iOS client build and test (for PRs)

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  XCODE_PROJECT_DIR: ./Clients/iOS/FitWithFriends
  WORKSPACE_NAME: FitWithFriends.xcworkspace

jobs:
  ios-archive:
    name: iOS archive (validates deploy pipeline)
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Archive
        working-directory: ${{ env.XCODE_PROJECT_DIR }}
        run: |
          xcodebuild archive \
            -workspace "$WORKSPACE_NAME" \
            -scheme FitWithFriends \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/FitWithFriends-pr.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CURRENT_PROJECT_VERSION="$(date +'%Y%m%d.%H%M')"

      - name: Verify CFBundleVersion was stamped
        run: |
          version=$(plutil -extract CFBundleVersion raw \
            "$RUNNER_TEMP/FitWithFriends-pr.xcarchive/Products/Applications/Fit with Friends.app/Info.plist")
          echo "CFBundleVersion: $version"
          # Expect YYYYMMDD.HHMM format
          if ! echo "$version" | grep -qE '^[0-9]{8}\.[0-9]{4}$'; then
            echo "error: CFBundleVersion '$version' does not match expected YYYYMMDD.HHMM format"
            exit 1
          fi

  ios-tests:
    name: iOS build and test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: WebService/FitWithFriends/package-lock.json

      - name: Start UI test backend
        run: Scripts/start-ui-test-backend-native.sh

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build
        env:
          scheme: ${{ 'FitWithFriends' }}
          platform: ${{ 'iOS Simulator' }}
        working-directory: ${{ env.XCODE_PROJECT_DIR }}
        run: |
          # Pick the iPhone simulator with the highest available OS version
          # xcrun xctrace returns via stderr, not the expected stdout (see https://developer.apple.com/forums/thread/663959)
          device=$(xcrun xctrace list devices 2>&1 | grep -E 'iPhone.*Simulator \(' | sort -t'(' -k2 -V -k1,1 | tail -1 | sed -E 's/ Simulator \([0-9.]+\).*$//' | xargs)
          xcodebuild build-for-testing -scheme "$scheme" -workspace $WORKSPACE_NAME -destination "platform=$platform,OS=latest,name=$device" CODE_SIGNING_ALLOWED=NO

      - name: Test (unit tests, parallel)
        env:
          scheme: ${{ 'FitWithFriends' }}
          platform: ${{ 'iOS Simulator' }}
        working-directory: ${{ env.XCODE_PROJECT_DIR }}
        run: |
          # Pick the iPhone simulator with the highest available OS version
          # xcrun xctrace returns via stderr, not the expected stdout (see https://developer.apple.com/forums/thread/663959)
          device=$(xcrun xctrace list devices 2>&1 | grep -E 'iPhone.*Simulator \(' | sort -t'(' -k2 -V -k1,1 | tail -1 | sed -E 's/ Simulator \([0-9.]+\).*$//' | xargs)
          xcodebuild test-without-building \
            -scheme "$scheme" \
            -workspace $WORKSPACE_NAME \
            -destination "platform=$platform,OS=latest,name=$device" \
            -only-testing:FitWithFriends_UnitTests \
            -skip-testing:FitWithFriends_UnitTests/WatchScreenshotTests \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 2 \
            CODE_SIGNING_ALLOWED=NO

      - name: Test (UI tests)
        env:
          scheme: ${{ 'FitWithFriends' }}
          platform: ${{ 'iOS Simulator' }}
        working-directory: ${{ env.XCODE_PROJECT_DIR }}
        run: |
          # Pick the iPhone simulator with the highest available OS version
          # xcrun xctrace returns via stderr, not the expected stdout (see https://developer.apple.com/forums/thread/663959)
          device=$(xcrun xctrace list devices 2>&1 | grep -E 'iPhone.*Simulator \(' | sort -t'(' -k2 -V -k1,1 | tail -1 | sed -E 's/ Simulator \([0-9.]+\).*$//' | xargs)
          xcodebuild test-without-building \
            -scheme "$scheme" \
            -workspace $WORKSPACE_NAME \
            -destination "platform=$platform,OS=latest,name=$device" \
            -only-testing:FitWithFriends_UITests \
            CODE_SIGNING_ALLOWED=NO

      - name: Stop UI test backend
        if: always()
        run: Scripts/stop-ui-test-backend-native.sh

  watch-tests:
    name: Watch unit tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Test
        working-directory: ${{ env.XCODE_PROJECT_DIR }}
        run: |
          device_id=$(xcrun simctl list devices available --json | jq -r '[.devices | to_entries[] | select(.key | contains("watchOS")) | {os: .key, udid: .value[].udid}] | sort_by(.os) | last | .udid')
          xcodebuild test \
            -scheme "FitWithFriends Watch App" \
            -workspace $WORKSPACE_NAME \
            -destination "platform=watchOS Simulator,id=$device_id" \
            CODE_SIGNING_ALLOWED=NO

  watch-ui-tests:
    name: Watch UI tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: WebService/FitWithFriends/package-lock.json

      - name: Start UI test backend
        run: Scripts/start-ui-test-backend-native.sh

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:3000 | grep -qE '^[2-4]'; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend not ready after 30s" && exit 1

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Test
        working-directory: ${{ env.XCODE_PROJECT_DIR }}
        run: |
          device_id=$(xcrun simctl list devices available --json | jq -r '[.devices | to_entries[] | select(.key | contains("watchOS")) | {os: .key, udid: .value[].udid}] | sort_by(.os) | last | .udid')
          xcodebuild test \
            -scheme "FitWithFriends Watch App UITests" \
            -workspace $WORKSPACE_NAME \
            -destination "platform=watchOS Simulator,id=$device_id" \
            -parallel-testing-enabled NO \
            -retry-tests-on-failure \
            -resultBundlePath "$RUNNER_TEMP/WatchUITests.xcresult" \
            CODE_SIGNING_ALLOWED=NO

      - name: Print test failures
        if: failure()
        run: |
          xcrun xcresulttool get test-results summary \
            --path "$RUNNER_TEMP/WatchUITests.xcresult" 2>/dev/null \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for f in data.get('testFailures', []):
              print(f'FAILED: {f[\"testName\"]}')
              print(f'  {f[\"failureText\"]}')
              print()
          " || echo "Could not extract test failure details"

      - name: Stop UI test backend
        if: always()
        run: Scripts/stop-ui-test-backend-native.sh
